<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隐私政策 | 齐浅浅</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f1320; color: #e8ecf3; }
      main { max-width: 860px; margin: 0 auto; padding: 36px 20px 64px; line-height: 1.7; }
      h1, h2 { line-height: 1.3; }
      .card { background: #171d2d; border: 1px solid #2a334a; border-radius: 12px; padding: 18px; margin: 14px 0; }
      a { color: #9bd0ff; }
    </style>
  </head>
  <body>
    <main>
      <h1>隐私政策</h1>
      <p>最后更新：2026-03-26</p>
      <div class="card">
        <h2>我们收集什么</h2>
        <ul>
          <li>我们不会收集、上传或存储你的任何个人信息。</li>
          <li>本产品为本地静态网页，数据处理发生在你的设备上。</li>
        </ul>
      </div>
      <div class="card">
        <h2>我们如何使用</h2>
        <ul>
          <li>我们不在服务器侧使用你的数据，因为我们不接收你的数据。</li>
          <li>页面功能仅在本地运行，不进行远程数据分析。</li>
        </ul>
      </div>
      <div class="card">
        <h2>你的控制权</h2>
        <ul>
          <li>你可随时清理浏览器本地缓存来移除本地数据。</li>
          <li>你可自行决定是否在本地设备保留使用痕迹。</li>
        </ul>
      </div>
      <p>如需进一步了解本地数据管理方式，请查看：<a href="./trust-controls.html">数据删除与记忆控制</a>。</p>
    </main>
  </body>
</html>
