<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隐私政策（草案） | 齐浅浅</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f1320; color: #e8ecf3; }
      main { max-width: 860px; margin: 0 auto; padding: 36px 20px 64px; line-height: 1.7; }
      h1, h2 { line-height: 1.3; }
      .card { background: #171d2d; border: 1px solid #2a334a; border-radius: 12px; padding: 18px; margin: 14px 0; }
      a { color: #9bd0ff; }
    </style>
  </head>
  <body>
    <main>
      <h1>隐私政策（草案）</h1>
      <p>最后更新：2026-03-26</p>
      <div class="card">
        <h2>我们收集什么</h2>
        <ul>
          <li>会话内容、记忆卡片、设定项（主要在本地浏览器保存）；</li>
          <li>用户主动输入的 API 配置；</li>
          <li>为功能调试所需的最小日志（如启用时）。</li>
        </ul>
      </div>
      <div class="card">
        <h2>我们如何使用</h2>
        <ul>
          <li>维持连续对话体验；</li>
          <li>生成与管理分身/群聊；</li>
          <li>改进记忆召回与个性化支持。</li>
        </ul>
      </div>
      <div class="card">
        <h2>你的控制权</h2>
        <ul>
          <li>导出 / 清空会话；</li>
          <li>记忆开关；</li>
          <li>删除特定记忆；</li>
          <li>申请数据删除（见“数据删除与记忆控制”页面）。</li>
        </ul>
      </div>
      <p>详情请同时查看：<a href="./trust-controls.html">数据删除与记忆控制</a>。</p>
    </main>
  </body>
</html>
